name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * *"   # 9am UTC daily — nightly governance check
  workflow_dispatch:       # manual trigger for interview demos

jobs:

  # ── LINT & VALIDATE ──────────────────────────────────────────────────────────
  validate:
    name: Lint & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install flake8 apache-airflow apache-airflow-providers-databricks

      - name: Lint Python files
        run: |
          flake8 databricks/notebooks/ airflow/ domo/pdp/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503,E501 \
            --exclude=__pycache__,.git

      - name: Validate Airflow DAG
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'airflow/include')
          from airflow.models import DagBag
          bag = DagBag(dag_folder='airflow/dags', include_examples=False)
          errors = bag.import_errors
          if errors:
              for path, err in errors.items():
                  print(f'ERROR in {path}: {err}')
              sys.exit(1)
          dags = list(bag.dags.keys())
          print(f'DAGs loaded: {dags}')
          assert 'specialtypulse_annual_pipeline' in bag.dags, 'DAG not found'
          dag = bag.dags['specialtypulse_annual_pipeline']
          task_ids = [t.task_id for t in dag.tasks]
          print(f'Tasks: {task_ids}')
          assert 'validate_inputs' in task_ids
          assert 'ingest_raw_cms'   in task_ids
          assert 'run_staging'      in task_ids
          assert 'run_marts'        in task_ids
          assert 'push_to_domo'     in task_ids
          assert 'notify_success'   in task_ids
          print('DAG validation passed')
          "

      - name: Validate notebook syntax
        run: |
          for f in databricks/notebooks/*.py; do
            echo "Checking $f..."
            # Strip Databricks magic lines (%pip, %sql, etc.) before compiling
            sed '/^%/d' "$f" > /tmp/_nb_check.py
            python -m py_compile /tmp/_nb_check.py && echo "  OK"
          done

      - name: Validate PDP scripts syntax
        run: |
          python -m py_compile domo/pdp/pdp_setup.py
          python -m py_compile domo/pdp/pdp_verify.py
          python -m py_compile domo/pdp/pdp_verify_writer.py
          echo "PDP scripts syntax OK"

  # ── DOMO APP BUILD ───────────────────────────────────────────────────────────
  app-build:
    name: Domo App build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: domo/app/package.json

      - name: Install app dependencies
        working-directory: domo/app
        run: npm install

      - name: Build Domo App
        working-directory: domo/app
        run: npm run build

      - name: Verify build output
        working-directory: domo/app
        run: |
          ls -lh dist/
          test -f dist/index.html  && echo "index.html present"
          ls dist/bundle.*.js      && echo "bundle present"

  # ── PDP GOVERNANCE CHECK ─────────────────────────────────────────────────────
  # Runs against live Domo when secrets are present.
  # Falls back to mock mode (validates script logic only) when secrets absent.
  pdp-verify:
    name: PDP governance verify
    runs-on: ubuntu-latest
    needs: validate      # only run if lint passes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install requests

      - name: Check if Domo secrets available
        id: check-secrets
        env:
          DOMO_CID: ${{ secrets.DOMO_CLIENT_ID }}
        run: |
          if [ -n "$DOMO_CID" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
          fi

      - name: Run PDP verify against live Domo
        if: steps.check-secrets.outputs.has_secrets == 'true'
        env:
          DOMO_CLIENT_ID:              ${{ secrets.DOMO_CLIENT_ID }}
          DOMO_CLIENT_SECRET:          ${{ secrets.DOMO_CLIENT_SECRET }}
          DOMO_DATASET_ID:             ${{ secrets.DOMO_DATASET_ID }}
          DOMO_INPUT_DATASET_ID:       ${{ secrets.DOMO_INPUT_DATASET_ID }}
          DOMO_VERIFY_RESULTS_DATASET_ID: ${{ secrets.DOMO_VERIFY_RESULTS_DATASET_ID }}
        run: python domo/pdp/pdp_verify_writer.py

      - name: Run PDP verify in mock mode (no secrets)
        if: steps.check-secrets.outputs.has_secrets == 'false'
        run: |
          echo "Domo secrets not configured — running syntax check only"
          python -c "
          import ast, sys
          for f in ['domo/pdp/pdp_verify_writer.py']:
              with open(f) as fh:
                  ast.parse(fh.read())
              print(f'  {f} — syntax OK')
          print('Mock mode passed (add DOMO_* secrets to enable live verify)')
          "
